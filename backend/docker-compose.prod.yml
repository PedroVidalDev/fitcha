services:
  api:
    environment:
      PORT: ${PORT:-8080}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      MERCADO_PAGO_ACCESS_TOKEN: ${MERCADO_PAGO_ACCESS_TOKEN}
      MERCADO_PAGO_API_URL: ${MERCADO_PAGO_API_URL:-}
      MERCADO_PAGO_WEBHOOK_SECRET: ${MERCADO_PAGO_WEBHOOK_SECRET}
      MERCADO_PAGO_WEBHOOK_URL: ${MERCADO_PAGO_WEBHOOK_URL}
      PLAN_MONTHLY_PRICE_CENTS: ${PLAN_MONTHLY_PRICE_CENTS:-1990}
      PLAN_MONTHLY_TITLE: ${PLAN_MONTHLY_TITLE:-Fitcha AI - Plano mensal}
      PLAN_PIX_EXPIRATION_MINUTES: ${PLAN_PIX_EXPIRATION_MINUTES:-30}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
    ports:
      - "${PORT:-8080}:${PORT:-8080}"

  db:
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5432}:5432"
