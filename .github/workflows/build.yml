name: Build APK

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive

      # Opcional: comenta o link do APK na última commit
      - name: Get build URL
        if: success()
        run: |
          echo "✅ Build iniciado! Acesse https://expo.dev/accounts para baixar o APK."
